<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Gifts Overlay</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Kosugi&family=Zen+Old+Mincho:wght@400;700;900&family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;700;900&family=Yuji+Syuku&family=Dela+Gothic+One&family=DotGothic16&family=Hachi+Maru+Pop&family=RocknRoll+One&family=Yusei+Magic&family=Kaisei+Decol:wght@400;500;700&family=Mochiy+Pop+One&family=Rampart+One&family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Antique&family=Yuji+Mai&display=swap');

        :root {
            --accent: #f59e0b;
            --text: #f8fafc;
            --muted: rgba(226, 232, 240, 0.82);
            --goal-fill-color: #f8fafc;
            --goal-count-color: #f59e0b;
            --goal-note-color: rgba(226, 232, 240, 0.82);
            --goal-stroke-color: rgba(15, 23, 42, 0.92);
            --goal-text-shadow: rgba(15, 23, 42, 0.3);
            --goal-stroke-width: 3px;
            --gift-width: 320px;
            --gift-height: 236px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: "M PLUS Rounded 1c", sans-serif;
        }

        body {
            padding: 32px;
            color: var(--text);
        }

        .overlay {
            display: none;
            width: min(1680px, calc(100vw - 64px));
            gap: 24px;
        }

        .overlay.is-visible {
            display: grid;
        }

        .overlay.is-empty {
            place-items: center;
            min-height: calc(100vh - 64px);
        }

        .overlay-message {
            display: grid;
            gap: 10px;
            justify-items: center;
            width: min(720px, 100%);
            padding: 28px 24px;
            border: 1px solid rgba(248, 250, 252, 0.18);
            background: rgba(15, 23, 42, 0.42);
            backdrop-filter: blur(8px);
        }

        .overlay-message-copy {
            color: var(--text);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
        }

        .goal-row {
            display: grid;
            gap: 6px;
            justify-items: center;
            padding: 0;
            font-family: var(--goal-font-family, "M PLUS Rounded 1c", sans-serif);
        }

        .goal-row.is-complete {
            background: transparent;
        }

        .gift-visual {
            position: relative;
            width: var(--gift-width);
            min-height: var(--gift-height);
        }

        .gift-image {
            display: block;
            width: var(--gift-width);
            height: var(--gift-height);
            object-fit: contain;
            background: transparent;
        }

        .copy {
            display: grid;
            gap: 2px;
            min-width: 0;
            width: var(--gift-width);
            max-width: 100%;
            justify-items: center;
            text-align: center;
        }

        .gift-name,
        .count,
        .note {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .gift-name {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 0 18px 0;
            text-align: center;
        }

        .count {
            margin-top: -4px;
        }

        .goal-svg-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            overflow: visible;
            white-space: nowrap;
        }

        .goal-svg-text svg {
            display: block;
            overflow: visible;
            max-width: 100%;
        }

        .goal-svg-text text {
            fill: currentColor;
            stroke: var(--goal-stroke-color);
            stroke-width: var(--goal-stroke-width);
            paint-order: stroke fill;
            stroke-linejoin: round;
            stroke-linecap: round;
            dominant-baseline: text-before-edge;
            vector-effect: non-scaling-stroke;
        }

        .gift-name .goal-svg-text {
            color: var(--goal-fill-color);
        }

        .gift-name .goal-svg-text text {
            text-shadow: 0 4px 14px var(--goal-text-shadow);
        }

        .count .goal-svg-text {
            color: var(--goal-count-color);
        }

        .note .goal-svg-text {
            color: var(--goal-note-color);
        }

        @media (max-width: 640px) {
            :root {
                --gift-width: 160px;
                --gift-height: 118px;
            }

            body {
                padding: 10px;
            }

            .overlay {
                width: calc(100vw - 20px);
            }

            .goal-row {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>

            },

                countColor: ['#fff3bf', '#d9a441', '#fff8db'],
                noteColor: 'rgba(255, 244, 214, 0.96)',
                strokeColor: 'rgba(107, 79, 42, 0.98)',
                textShadow: 'rgba(107, 79, 42, 0.34)'
            },
            'royal-velvet': {
                fillColor: ['#f5e9ff', '#c084fc', '#e9d5ff'],
                countColor: ['#ddd6fe', '#8b5cf6', '#f5d0fe'],
                noteColor: 'rgba(233, 213, 255, 0.94)',
                strokeColor: 'rgba(49, 46, 129, 0.98)',
                textShadow: 'rgba(49, 46, 129, 0.34)'
            },
            'emerald-luxe': {
                fillColor: ['#ecfdf5', '#86efac', '#d1fae5'],
                countColor: ['#d1fae5', '#10b981', '#a7f3d0'],
                noteColor: 'rgba(209, 250, 229, 0.94)',
                strokeColor: 'rgba(20, 83, 45, 0.98)',
                textShadow: 'rgba(20, 83, 45, 0.34)'
            },
            'sunrise-opal': {
                fillColor: ['#fff7ed', '#fdba74', '#f9a8d4'],
                countColor: ['#fde68a', '#fb7185', '#fdba74'],
                noteColor: 'rgba(254, 215, 170, 0.94)',
                strokeColor: 'rgba(154, 52, 18, 0.98)',
                textShadow: 'rgba(154, 52, 18, 0.34)'
            }
        };

        function getGoalGiftFontFamily(value) {
            const normalizedValue = String(value || '').trim().toLowerCase();
            return goalGiftFonts[normalizedValue] || goalGiftFonts.default;
        }

        function getGoalGiftTextStyle(value) {
            const normalizedValue = String(value || '').trim().toLowerCase();
            return goalGiftTextStyles[normalizedValue] || goalGiftTextStyles['gold-night'];
        }

        function getGoalGiftStrokeWidth(value) {
            const parsed = Number.parseInt(String(value ?? ''), 10);
            if (!Number.isInteger(parsed) || parsed < 0) {
                return 3;
            }

            return Math.min(parsed, 24);
        }

        function getPrimaryFontFamily(fontFamily) {
            const match = String(fontFamily || '').match(/"([^"]+)"/);
            return match ? `"${match[1]}"` : String(fontFamily || '').split(',')[0]?.trim() || 'sans-serif';
        }

        async function ensureGoalGiftFontLoaded(fontFamily) {
            if (!document.fonts?.load) {
                return;
            }

            const primaryFamily = getPrimaryFontFamily(fontFamily);

            try {
                await Promise.all([
                    document.fonts.load(`400 1em ${primaryFamily}`),
                    document.fonts.load(`700 1em ${primaryFamily}`)
                ]);
            } catch {
                // Fall through to normal render using whatever fonts are available.
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTextPaint(value) {
            if (Array.isArray(value)) {
                return value.filter((item) => typeof item === 'string' && item.trim());
            }

            return typeof value === 'string' && value.trim() ? value.trim() : '';
        }

        function getTextPaintPreviewColor(value, fallback) {
            const normalizedValue = normalizeTextPaint(value);
            if (Array.isArray(normalizedValue)) {
                return normalizedValue[0] || fallback;
            }

            return normalizedValue || fallback;
        }

        function buildSvgPaint(fill, prefix) {
            const normalizedFill = normalizeTextPaint(fill);
            if (Array.isArray(normalizedFill) && normalizedFill.length >= 2) {
                const gradientId = `${prefix}-gradient`;
                const stops = normalizedFill
                    .map((color, index) => {
                        const offset = normalizedFill.length === 1 ? 0 : (index / (normalizedFill.length - 1)) * 100;
                        return `<stop offset="${offset}%" stop-color="${escapeHtml(color)}"></stop>`;
                    })
                    .join('');

                return {
                    defs: `<defs><linearGradient id="${gradientId}" x1="0%" y1="0%" x2="100%" y2="0%">${stops}</linearGradient></defs>`,
                    fill: `url(#${gradientId})`
                };
            }

            return {
                defs: '',
                fill: escapeHtml(normalizedFill || '#ffffff')
            };
        }

        function buildOutlinedSvgMarkup(text, options = {}) {
            const fontSize = Number(options.fontSize) || 16;
            const fontWeight = Number(options.fontWeight) || 700;
            const strokeWidth = Number(options.strokeWidth) || 0;
            const shadowPad = Number(options.shadowPad) || 0;
            const layoutHeight = Number(options.layoutHeight) || 0;
            const paint = buildSvgPaint(options.fill, options.idPrefix || `goal-text-${Math.random().toString(36).slice(2, 10)}`);

            return `
                <span class="goal-svg-text" data-outlined-svg-host data-stroke-width="${strokeWidth}" data-shadow-pad="${shadowPad}" data-layout-height="${layoutHeight}">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                        ${paint.defs}
                        <text data-outlined-svg-text x="0" y="0" style="font-size:${fontSize}px;font-weight:${fontWeight};fill:${paint.fill};">${escapeHtml(text)}</text>
                    </svg>
                </span>
            `;
        }

        function layoutOutlinedSvgText(container = document) {
            container.querySelectorAll('[data-outlined-svg-host]').forEach((host) => {
                const svg = host.querySelector('svg');
                const text = host.querySelector('[data-outlined-svg-text]');

                if (!svg || !text) {
                    return;
                }

                text.setAttribute('font-family', getComputedStyle(host).fontFamily);

                let bounds;
                try {
                    bounds = text.getBBox();
                } catch {
                    return;
                }

                const strokeWidth = Number.parseFloat(host.dataset.strokeWidth || '0') || 0;
                const shadowPad = Number.parseFloat(host.dataset.shadowPad || '0') || 0;
                const horizontalPadding = Math.max(2, strokeWidth + shadowPad);
                const verticalPadding = Math.max(1, strokeWidth + Math.min(shadowPad, 2));
                const width = Math.max(1, bounds.width + horizontalPadding * 2);
                const height = Math.max(1, bounds.height + verticalPadding * 2);
                const fixedLayoutHeight = Number.parseFloat(host.dataset.layoutHeight || '0') || 0;
                const layoutHeight = Math.max(1, fixedLayoutHeight || bounds.height);

                svg.setAttribute('viewBox', `${bounds.x - horizontalPadding} ${bounds.y - verticalPadding} ${width} ${height}`);
                svg.setAttribute('width', `${width}`);
                svg.setAttribute('height', `${height}`);
                host.style.width = `${width}px`;
                host.style.height = `${layoutHeight}px`;
            });
        }

        async function render(snapshot) {
            const sourceGoals = Array.isArray(snapshot?.goals) ? snapshot.goals : [];
            const fontFamily = getGoalGiftFontFamily(snapshot?.fontKey);
            const textStyle = getGoalGiftTextStyle(snapshot?.textStyleKey);
            const strokeWidth = getGoalGiftStrokeWidth(snapshot?.strokeWidth);
            const fillPreviewColor = getTextPaintPreviewColor(textStyle.fillColor, '#f8fafc');
            const countPreviewColor = getTextPaintPreviewColor(textStyle.countColor, fillPreviewColor);
            const notePreviewColor = getTextPaintPreviewColor(textStyle.noteColor, fillPreviewColor);
            const hasValidTargetGift = (item) => Boolean(item?.giftId && item?.giftName);
            const requestedGoal = Number.isInteger(requestedSlot) && requestedSlot > 0
                ? sourceGoals.find((item) => Number(item.slot) === requestedSlot)
                : null;
            const goals = requestedGoal
                ? (hasValidTargetGift(requestedGoal) ? [requestedGoal] : [])
                : sourceGoals.filter((item) => item.enabled && hasValidTargetGift(item));

            if (requestedGoal && !hasValidTargetGift(requestedGoal)) {
                await ensureGoalGiftFontLoaded(fontFamily);
                overlay.classList.add('is-visible', 'is-empty');
                overlay.innerHTML = `
                    <div class="overlay-message" style='font-family: ${fontFamily};'>
                        <div class="overlay-message-copy">対象ギフト未選択</div>
                    </div>
                `;
                return;
            }

            if (!goals.length) {
                overlay.classList.remove('is-visible', 'is-empty');
                overlay.innerHTML = '';
                return;
            }

            await ensureGoalGiftFontLoaded(fontFamily);

            overlay.classList.add('is-visible');
            overlay.classList.remove('is-empty');
            overlay.innerHTML = goals.map((goal, index) => `
                <div class="goal-row ${goal.completed ? 'is-complete' : ''}" style='font-family: ${fontFamily}; --goal-font-family: ${fontFamily}; --goal-fill-color: ${fillPreviewColor}; --goal-count-color: ${countPreviewColor}; --goal-note-color: ${notePreviewColor}; --goal-stroke-color: ${textStyle.strokeColor}; --goal-text-shadow: ${textStyle.textShadow}; --goal-stroke-width: ${strokeWidth}px;'>
                    <div class="gift-visual">
                        <img class="gift-image" src="${escapeHtml(goal.giftImage || '')}" alt="gift" ${goal.giftImage ? '' : 'style="visibility:hidden"'}>
                        <div class="gift-name">${buildOutlinedSvgMarkup(goal.displayName || goal.giftName, { fontSize: window.innerWidth <= 640 ? 24 : 46, fontWeight: 700, strokeWidth, shadowPad: 10, layoutHeight: window.innerWidth <= 640 ? 26 : 48, fill: textStyle.fillColor, idPrefix: `goal-name-${index}` })}</div>
                    </div>
                    <div class="copy">
                        <div class="count">${buildOutlinedSvgMarkup(`${goal.currentCount}/${goal.targetCount}`, { fontSize: window.innerWidth <= 640 ? 34 : 62, fontWeight: 700, strokeWidth, layoutHeight: window.innerWidth <= 640 ? 36 : 64, fill: textStyle.countColor, idPrefix: `goal-count-${index}` })}</div>
                        ${goal.note ? `<div class="note">${buildOutlinedSvgMarkup(goal.note, { fontSize: window.innerWidth <= 640 ? 16 : 28, fontWeight: 700, strokeWidth, layoutHeight: window.innerWidth <= 640 ? 18 : 30, fill: textStyle.noteColor, idPrefix: `goal-note-${index}` })}</div>` : ''}
                    </div>
                </div>
            `).join('');
            layoutOutlinedSvgText(overlay);
        }

        async function refresh() {
            const response = await fetch('/api/widgets/goal-gifts/snapshot');
            const payload = await response.json();
            await render(payload.snapshot);
        }

        socket.on('admin_day_updated', () => {
            refresh().catch(() => {});
        });

        socket.on('widgets:goal-gifts:updated', (payload) => {
            render(payload?.snapshot).catch(() => {});
        });

        refresh().catch(() => {});
        setInterval(() => {
            refresh().catch(() => {});
        }, 10000);
    </script>
</body>
